checks:
  - check: message
    regex: '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test){1}(\([\w\-\.]+\))?(!)?: ([\w ])+([\s\S]*)|(Merge).*|(fixup!.*)'
    error: |
      The commit message should be structured as follows:

      <type>[optional scope]: <description>
      [optional body]
      [optional footer(s)]

      More details please refer to https://www.conventionalcommits.org
    suggest: please check your commit message whether matches above regex

  - check: branch
    regex: '^(bugfix|feature|release|hotfix|task|chore|fix|feat|docs|style|refactor|perf|test|ci|build)\/.+|(master)|(main)|(HEAD)|(PR-.+)'
    error: 'Branches must begin with an allowed type prefix such as bugfix/ feature/ release/ hotfix/ task/ chore/ fix/ feat/ docs/ style/ refactor/ perf/ test/ ci/ build/'
    suggest: 'run command `git checkout -b type/branch_name`'

  - check: author_name
    regex: '^[A-Za-zÀ-ÖØ-öø-ÿ\u0100-\u017F\u0180-\u024F ,.\''-]+$|.*(\[bot])'
    error: The committer name seems invalid
    suggest: 'run command `git config user.name "Your Name"`'

  - check: author_email
    regex: '^.+@.+$'
    error: The committer''s email seems invalid
    suggest: 'run command `git config user.email yourname@example.com`'

  - check: commit_signoff
    regex: 'Signed-off-by:.*[A-Za-z0-9]\s+<.+@.+>'
    error: Signed-off-by not found in latest commit
    suggest: 'run command `git commit -m "conventional commit message" --signoff`'

  - check: merge_base
    regex: 'main'
    error: Current branch is not rebased onto target branch
    suggest: Please ensure your branch is rebased with the target branch

  - check: imperative
    regex: ''
    error: Commit message should use imperative mood (e.g., "Add feature" not "Added feature")
    suggest: 'Use imperative mood in commit message like "Add", "Fix", "Update", "Remove"'
